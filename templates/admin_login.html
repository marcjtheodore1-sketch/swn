{% extends "base.html" %}

{% block title %}Admin Login - Strolling with Neurokin{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center bg-gradient-to-br from-swn-purple/5 to-swn-teal/5 py-12">
    <div class="w-full max-w-md mx-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <div class="text-center">
                <div class="mb-6">
                    <div class="w-20 h-20 bg-swn-purple rounded-full flex items-center justify-center mx-auto">
                        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                </div>

                <h2 class="text-2xl font-bold text-gray-800 mb-2">Admin Access</h2>
                <p class="text-gray-600 mb-6">Please enter the admin password to continue</p>

                <form method="POST" class="space-y-5">
                    <div>
                        <label for="password" class="block text-sm font-semibold text-gray-700 mb-2 text-left">
                            Password
                        </label>
                        <input type="password" id="password" name="password" required autofocus
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-swn-purple focus:border-transparent text-lg"
                            placeholder="Enter password">
                    </div>

                    <button type="submit" class="w-full bg-swn-purple text-white px-6 py-3 rounded-lg font-semibold hover:bg-opacity-90 transition-all">
                        Enter Admin Area
                    </button>
                </form>

                <div class="mt-6 pt-6 border-t border-gray-200">
                    <a href="{{ url_for('landing') }}" class="text-swn-purple hover:underline text-sm">
                        ← Return to homepage
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
